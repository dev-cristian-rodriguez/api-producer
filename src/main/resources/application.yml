server:
  port: 8080

spring:
  application:
    name: api-producer

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:messaging_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:messaging_user}
    password: ${MYSQL_PASSWORD:messaging_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

app:
  api-key: ${API_KEY:my-secret-api-key-2025}
  rabbitmq:
    exchange: messaging.exchange
    queue: messaging.queue
    routing-key: messaging.routing.key
    retry-queue: messaging.retry.queue
    retry-routing-key: messaging.retry.routing.key
    dlq-queue: messaging.dlq.queue
    dlq-routing-key: messaging.dlq.routing.key
    retry-ttl: 5000
    max-retries: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: api-producer
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.aldeamo.messaging: DEBUG
    org.springframework.amqp: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId:-}] %-5level %logger{36} - %msg%n"
